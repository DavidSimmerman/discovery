# XcodeGen spec — run `xcodegen generate` in ios/ after editing.
# The .xcodeproj is generated and gitignored; this file is the source of truth.
name: Discovery
options:
  bundleIdPrefix: tech.simmerman
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    # Set your 10-char Apple Team ID here (or via `xcodebuild DEVELOPMENT_TEAM=…`)
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic

targets:
  Discovery:
    type: application
    platform: iOS
    sources:
      - Discovery
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.simmerman.discovery
        INFOPLIST_KEY_UILaunchScreen_Generation: true
    info:
      path: Discovery/Info.plist
      properties:
        CFBundleDisplayName: discovery
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # Live Activity taps deep-link via discovery://now-playing
        CFBundleURLTypes:
          - CFBundleURLName: tech.simmerman.discovery
            CFBundleURLSchemes:
              - discovery
    entitlements:
      path: Discovery/Discovery.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.tech.simmerman.discovery
    dependencies:
      - target: DiscoveryWidgets

  DiscoveryWidgets:
    type: app-extension
    platform: iOS
    sources:
      - DiscoveryWidgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: tech.simmerman.discovery.widgets
    info:
      path: DiscoveryWidgets/Info.plist
      properties:
        CFBundleDisplayName: discovery widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: DiscoveryWidgets/DiscoveryWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.tech.simmerman.discovery
